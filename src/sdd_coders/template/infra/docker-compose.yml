services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Bind to loopback only: Docker publishes ports past the host firewall (UFW),
    # so "55432:5432" would expose Postgres to the internet on a VPS.
    ports:
      - "127.0.0.1:55432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/backend.Dockerfile
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      APP_DATABASE_URL: ${APP_DATABASE_URL}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      APP_EMAIL_PROVIDER: ${APP_EMAIL_PROVIDER:-memory}
      APP_RESEND_API_KEY: ${APP_RESEND_API_KEY:-}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:3000}
      APP_TURNSTILE_ENABLED: ${APP_TURNSTILE_ENABLED:-false}
      APP_TURNSTILE_SECRET_KEY: ${APP_TURNSTILE_SECRET_KEY:-}
      ALEMBIC_DATABASE_URL: ${ALEMBIC_DATABASE_URL}
    # Migrations run from the image entrypoint (alembic upgrade head), so no
    # command override is needed here.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

  # Opt-in daily pg_dump with retention. Enable with:
  #   docker compose --profile backup up -d backup
  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - pgbackups:/backups
    entrypoint: ["sh", "/backup.sh"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pgbackups:
