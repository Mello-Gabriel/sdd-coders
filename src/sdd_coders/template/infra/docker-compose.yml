services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "55432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/backend.Dockerfile
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      APP_DATABASE_URL: ${APP_DATABASE_URL}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      APP_EMAIL_PROVIDER: ${APP_EMAIL_PROVIDER:-memory}
      APP_RESEND_API_KEY: ${APP_RESEND_API_KEY:-}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:3000}
      APP_TURNSTILE_ENABLED: ${APP_TURNSTILE_ENABLED:-false}
      APP_TURNSTILE_SECRET_KEY: ${APP_TURNSTILE_SECRET_KEY:-}
      ALEMBIC_DATABASE_URL: ${ALEMBIC_DATABASE_URL}
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
