server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect stdout/stderr from every Docker container (the backend logs JSON via
  # structlog, so Loki can parse fields). Containers are discovered from the
  # Docker socket; logs are read from the mounted containers directory.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
    pipeline_stages:
      # Backend lines are JSON; lift level + event for easy querying in Grafana.
      - json:
          expressions:
            level: level
            event: event
      - labels:
          level:
