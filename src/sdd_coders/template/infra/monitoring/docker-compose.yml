# Self-hosted observability stack: metrics (Prometheus), logs (Loki + Promtail),
# dashboards (Grafana), host metrics (Node Exporter).
#
# Run on the VPS alongside the app:
#   docker compose -f infra/monitoring/docker-compose.yml up -d
#
# Prefer NOT to self-host on a single VPS for anything critical: if the box dies
# you lose the app AND its monitoring. The free Grafana Cloud tier
# (Prometheus + Loki + Tempo, managed) is a better default — see README.md.
#
# Prometheus scrapes the backend at APP_METRICS_TARGET (default host gateway).

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    pid: host
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - lokidata:/loki
    ports:
      - "127.0.0.1:3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.2.0
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped

volumes:
  promdata:
  lokidata:
  grafanadata:
