name: Deploy — dev

on:
  push:
    branches: [main]

# Only one dev deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: infra/docker/backend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:dev

      # NEXT_PUBLIC_* must be baked in at *build* time (they're inlined into the
      # client bundle), so they are build-args, not runtime env.
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: infra/docker/frontend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:dev
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL_DEV }}
            NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Trigger Coolify deploy — backend (dev)
        run: |
          curl -sf -X POST "${{ secrets.COOLIFY_URL }}/api/v1/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"uuid":"${{ secrets.COOLIFY_DEV_BACKEND_UUID }}","force":false}'

      - name: Trigger Coolify deploy — frontend (dev)
        run: |
          curl -sf -X POST "${{ secrets.COOLIFY_URL }}/api/v1/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"uuid":"${{ secrets.COOLIFY_DEV_FRONTEND_UUID }}","force":false}'
