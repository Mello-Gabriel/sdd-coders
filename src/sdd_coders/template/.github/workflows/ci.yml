name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (lint, types, tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      TEST_OWNER_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/app
      APP_DATABASE_URL: postgresql+asyncpg://app_user:app_pass@localhost:5432/app
      APP_JWT_SECRET: ci-secret-not-for-production-0123456789
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest

  migrations:
    name: Migrations (virgin DB up/down/up)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      ALEMBIC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/app
      APP_JWT_SECRET: ci-secret-not-for-production-0123456789
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --dev
      # The migration grants privileges to app_user, which must exist first
      # (production provisions it out of band; here we mirror that).
      - name: Provision app_user role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d app -c "CREATE ROLE app_user LOGIN PASSWORD 'app_pass' NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;"
      # This is the check that would have caught the squashed-migration bug:
      # a fresh database must migrate cleanly, roll back, and migrate again.
      - name: Upgrade (virgin DB)
        run: uv run alembic upgrade head
      - name: Downgrade to base
        run: uv run alembic downgrade base
      - name: Upgrade again
        run: uv run alembic upgrade head

  frontend:
    name: Frontend (lint, types, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v4
      - name: SAST (bandit)
        run: uvx bandit -r backend/app
      - name: SAST (semgrep)
        run: uvx semgrep scan --config auto --error backend frontend

  docker:
    name: Build & scan images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f infra/docker/backend.Dockerfile -t app-backend:ci backend
      - name: Build frontend image
        run: docker build -f infra/docker/frontend.Dockerfile -t app-frontend:ci frontend
      - name: Scan backend image (trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-backend:ci
          severity: CRITICAL,HIGH
          exit-code: "1"

  docs:
    name: Build & publish docs
    runs-on: ubuntu-latest
    needs: [backend]
    permissions:
      contents: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --group docs
      - name: Regenerate build artifacts
        run: |
          uv run python scripts/dump_openapi.py
          uv run python scripts/gen_erd.py
          npx --yes openapi-typescript openapi.json -o ../frontend/lib/api/schema.ts
      - name: Fail if generated artifacts are stale (run /sdd-docs)
        run: git diff --exit-code openapi.json docs/erd.md ../frontend/lib/api/schema.ts
      - name: Build site (strict)
        run: uv run mkdocs build --strict
      - name: Publish to GitHub Pages (main only)
        if: github.ref == 'refs/heads/main'
        run: uv run mkdocs gh-deploy --force

  iac:
    name: IaC validation (Terraform + Ansible)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
      - name: terraform fmt check
        run: terraform fmt -check -recursive
      - name: terraform init (no backend)
        run: terraform init -backend=false
      - name: terraform validate
        run: terraform validate
      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
      - name: tflint
        run: tflint --recursive
      - name: Install ansible-lint
        run: pip install ansible-lint
        working-directory: .
      - name: ansible-lint
        run: ansible-lint infra/ansible/playbooks/harden.yml
        working-directory: ${{ github.workspace }}

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Start the stack
        run: |
          cp .env.example .env
          docker compose -f infra/docker-compose.yml up -d --build
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Wait for services
        run: npx --yes wait-on http://localhost:3000 http://localhost:8000/health/ready --timeout 180000
      - name: Run Playwright
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run e2e
      - name: Stack logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs
