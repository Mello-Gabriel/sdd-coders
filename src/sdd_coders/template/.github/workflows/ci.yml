name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (lint, types, tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      TEST_OWNER_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/app
      APP_DATABASE_URL: postgresql+asyncpg://app_user:app_pass@localhost:5432/app
      APP_JWT_SECRET: ci-secret-not-for-production-0123456789
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest

  frontend:
    name: Frontend (lint, types, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v4
      - name: SAST (bandit)
        run: uvx bandit -r backend/app
      - name: SAST (semgrep)
        run: uvx semgrep scan --config auto --error backend frontend

  docker:
    name: Build & scan images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f infra/docker/backend.Dockerfile -t app-backend:ci backend
      - name: Build frontend image
        run: docker build -f infra/docker/frontend.Dockerfile -t app-frontend:ci frontend
      - name: Scan backend image (trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app-backend:ci
          severity: CRITICAL,HIGH
          exit-code: "1"

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Start the stack
        run: |
          cp .env.example .env
          docker compose -f infra/docker-compose.yml up -d --build
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Wait for services
        run: npx --yes wait-on http://localhost:3000 http://localhost:8000/health/ready --timeout 180000
      - name: Run Playwright
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run e2e
      - name: Stack logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs
