name: Deploy — prod

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy-prod:
    name: Deploy to prod
    runs-on: ubuntu-latest
    environment: prod  # requires manual approval from configured reviewers

    steps:
      - uses: actions/checkout@v4

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: infra/docker/backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:prod
            ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: infra/docker/frontend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:prod
            ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL_PROD }}
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Trigger Coolify deploy — backend (prod)
        run: |
          curl -sf -X POST "${{ secrets.COOLIFY_URL }}/api/v1/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"uuid":"${{ secrets.COOLIFY_PROD_BACKEND_UUID }}","force":false}'

      - name: Trigger Coolify deploy — frontend (prod)
        run: |
          curl -sf -X POST "${{ secrets.COOLIFY_URL }}/api/v1/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"uuid":"${{ secrets.COOLIFY_PROD_FRONTEND_UUID }}","force":false}'
