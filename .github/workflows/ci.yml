name: CI

on:
  push:
  pull_request:

jobs:
  engine:
    name: Engine quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --dev

      - name: Check plugin agents/skills are in sync with the template
        run: uv run python scripts/sync_plugin.py --check

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Tests + coverage gate
        run: uv run pytest

  packaging:
    name: Wheel packaging smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build the wheel
        run: uv build

      - name: Install the wheel into a clean venv
        run: |
          uv venv /tmp/sdd-smoke-venv
          uv pip install --python /tmp/sdd-smoke-venv/bin/python dist/*.whl

      - name: Smoke test the installed CLI
        run: |
          /tmp/sdd-smoke-venv/bin/sdd-coders version
          /tmp/sdd-smoke-venv/bin/sdd-coders init /tmp/smoke-app --name smoke-app
          test -d /tmp/smoke-app/.claude/skills
          test -d /tmp/smoke-app/specs

      - name: Smoke test `adopt` on an existing repo
        run: |
          mkdir -p /tmp/smoke-legacy && git -C /tmp/smoke-legacy init -q
          /tmp/sdd-smoke-venv/bin/sdd-coders adopt /tmp/smoke-legacy
          test -f /tmp/smoke-legacy/.claude/skills/sdd-constitution/SKILL.md
          test -f /tmp/smoke-legacy/.claude/hooks/pre-commit-gate.sh
          test -f /tmp/smoke-legacy/specs/constitution.md
