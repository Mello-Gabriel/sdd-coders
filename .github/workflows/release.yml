name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build, smoke-test, publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # PyPI Trusted Publishing (OIDC) — no API token needed

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      # Prove the built wheel actually scaffolds a project before publishing it.
      - name: Smoke test the wheel
        run: |
          wheel="$(ls dist/*.whl)"
          uvx --from "$wheel" sdd-coders init /tmp/smoke --name smoke-app
          test -f /tmp/smoke/backend/pyproject.toml
          test -f /tmp/smoke/.copier-answers.yml

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
